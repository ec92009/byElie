<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Simple Cute Cocker</title>
  <desc>A simplified cocker spaniel illustration suitable for SVG editing.</desc>

  <!-- Tail -->
  <path d="M770 760 C860 800 875 845 820 860 C775 872 730 835 705 790 Z" fill="#C98534"/>

  <!-- Body -->
  <ellipse cx="512" cy="640" rx="250" ry="280" fill="#E5AE61"/>

  <!-- Chest -->
  <path d="M420 500 
           C455 455 570 455 605 500
           C650 560 635 720 585 790
           C555 835 470 835 440 790
           C390 720 375 560 420 500 Z"
        fill="#F1C57F"/>

  <!-- Head -->
  <circle cx="512" cy="285" r="175" fill="#E5AE61"/>

  <!-- Ears -->
  <path d="M325 230
           C240 250 210 355 235 470
           C250 540 285 585 345 580
           C320 540 322 505 322 465
           C322 390 338 305 325 230 Z"
        fill="#D69342"/>
  <path d="M699 230
           C784 250 814 355 789 470
           C774 540 739 585 679 580
           C704 540 702 505 702 465
           C702 390 686 305 699 230 Z"
        fill="#D69342"/>

  <!-- Inner ear waves -->
  <path d="M278 360 C255 400 255 455 285 500" stroke="#C98534" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M318 335 C290 390 292 470 325 530" stroke="#C98534" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M746 360 C769 400 769 455 739 500" stroke="#C98534" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M706 335 C734 390 732 470 699 530" stroke="#C98534" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="435" cy="290" rx="34" ry="42" fill="#3C220F"/>
  <ellipse cx="589" cy="290" rx="34" ry="42" fill="#3C220F"/>
  <circle cx="448" cy="276" r="10" fill="#ffffff"/>
  <circle cx="602" cy="276" r="10" fill="#ffffff"/>

  <!-- Eyebrows -->
  <path d="M395 220 Q435 190 470 220" stroke="#C98534" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M554 220 Q589 190 629 220" stroke="#C98534" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Muzzle -->
  <ellipse cx="512" cy="385" rx="98" ry="72" fill="#EDBD74"/>

  <!-- Nose -->
  <ellipse cx="512" cy="350" rx="52" ry="38" fill="#1F1B17"/>

  <!-- Mouth -->
  <path d="M512 388 L512 435" stroke="#3C220F" stroke-width="8" stroke-linecap="round"/>
  <path d="M512 435 C485 462 445 462 425 435" stroke="#3C220F" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M512 435 C539 462 579 462 599 435" stroke="#3C220F" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <path d="M472 430 
           C475 485 550 485 552 430
           C535 448 490 448 472 430 Z"
        fill="#E9838B"/>
  <path d="M512 435 C510 450 510 465 512 478" stroke="#C46B73" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Arms / front legs -->
  <rect x="352" y="620" width="92" height="250" rx="42" fill="#E5AE61"/>
  <rect x="580" y="620" width="92" height="250" rx="42" fill="#E5AE61"/>

  <!-- Front paws -->
  <ellipse cx="398" cy="870" rx="72" ry="40" fill="#E5AE61"/>
  <ellipse cx="626" cy="870" rx="72" ry="40" fill="#E5AE61"/>
  <path d="M365 855 Q355 875 365 892" stroke="#C98534" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M398 852 Q388 875 398 895" stroke="#C98534" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M431 855 Q421 875 431 892" stroke="#C98534" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M593 855 Q583 875 593 892" stroke="#C98534" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M626 852 Q616 875 626 895" stroke="#C98534" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M659 855 Q649 875 659 892" stroke="#C98534" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Hind paws -->
  <ellipse cx="330" cy="845" rx="54" ry="30" fill="#C98534"/>
  <ellipse cx="694" cy="845" rx="54" ry="30" fill="#C98534"/>

  <!-- Chest fluff simple -->
  <path d="M500 525 L470 600 L505 585 L480 665 L522 648 L510 740" fill="none" stroke="#E5AE61" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M524 525 L554 600 L519 585 L544 665 L502 648 L514 740" fill="none" stroke="#E5AE61" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
