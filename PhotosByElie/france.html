<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Photos By Elie | France Gallery</title>
  <meta name="description" content="Mock France photo gallery for Photos By Elie."/>
  <link rel="icon" type="image/png" sizes="512x512" href="./assets/byelie-logo.png"/>
  <script>(()=>{try{const saved=localStorage.getItem('byelie-theme');if(saved==='light'||saved==='dark')document.documentElement.dataset.theme=saved}catch{}})();</script>
  <link rel="stylesheet" href="./shared.css?v=0.2"/>
  <link rel="stylesheet" href="./styles.css?v=0.2"/>
  <link rel="stylesheet" href="./photos.css?v=0.2"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="topbar shell">
    <nav class="version-switch" aria-label="Site navigation">
      <a href="https://ec92009.github.io/byElie/">By Elie</a> <span>|</span>
      <a href="./">Photos</a> <span>|</span>
      <a class="is-active" href="./france.html">France</a>
    </nav>
    <div class="brand"><img class="site-logo" src="./assets/byelie-logo.png" alt="By Elie logo"/>PHOTOS BY ELIE - v0.2</div>
    <button class="theme-toggle" type="button" data-theme-toggle><span class="mode-light">Night</span><span class="mode-dark">Day</span></button>
  </header>
  <main id="main-content" class="shell">
    <section class="panel gallery-hero">
      <p class="eyebrow">Collection 01</p>
      <h1>France</h1>
      <p class="lead">Five mock frames for the France gallery: markets, streets, stone, tables, and evening light.</p>
      <div class="cta"><a class="btn secondary" href="./">Back to collections</a></div>
    </section>
    <section class="panel mock-gallery france-gallery" aria-label="France mock photos">
      <article class="mock-photo p1"><span>Paris Table Study</span></article>
      <article class="mock-photo p2"><span>Village Stone Lane</span></article>
      <article class="mock-photo p3"><span>Market Morning</span></article>
      <article class="mock-photo p4"><span>Window and Shutter</span></article>
      <article class="mock-photo p5"><span>Late Cafe Light</span></article>
    </section>
  </main>
  <script src="./photos.js?v=0.2"></script>
</body>
</html>
